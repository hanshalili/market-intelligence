# ==============================================================================
# dbt_project.yml — Apple & Tesla Market Intelligence Pipeline
# ==============================================================================

name: "market_intelligence"
version: "1.0.0"
config-version: 2

profile: "market_intelligence"

# Model path configuration
model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# Global model configurations
models:
  market_intelligence:
    # Staging layer: views, not materialised tables (cheap & always fresh)
    staging:
      +materialized: view
      +tags: ["staging"]

    # Mart layer: tables, partitioned + clustered for query performance
    marts:
      +materialized: table
      +tags: ["mart"]
      +partition_by:
        field: date
        data_type: date
        granularity: day
      +cluster_by: ["symbol"]

vars:
  # Passed by Airflow BashOperator: --vars '{"execution_date": "YYYY-MM-DD"}'
  # Defaults to current date when running dbt manually.
  execution_date: "{{ run_started_at.strftime('%Y-%m-%d') }}"
