# ==============================================================================
# docker-compose.yml — Airflow 2.8 with LocalExecutor
#
# Services:
#   postgres      — Airflow metadata database
#   airflow-init  — One-shot initialisation (db migrate + admin user)
#   webserver     — Airflow UI on http://localhost:8080
#   scheduler     — Triggers and monitors DAG runs
#
# Usage:
#   make airflow-init   # First-time setup
#   make airflow-up     # Start all services
#   make airflow-down   # Stop all services
# ==============================================================================

x-airflow-common: &airflow-common
  image: apache/airflow:2.8.1-python3.11
  env_file:
    - ../.env
  environment:
    &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    # Use the non-deprecated [database] section key
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__ENABLE_XCOM_PICKLING: "false"
    AIRFLOW__LOGGING__LOGGING_LEVEL: INFO

    # Pipeline environment variables (sourced from ../.env via env_file)
    ALPHA_VANTAGE_API_KEY: ${ALPHA_VANTAGE_API_KEY}
    GCP_PROJECT_ID: ${GCP_PROJECT_ID}
    GCS_BUCKET_NAME: ${GCS_BUCKET_NAME}
    BQ_DATASET: ${BQ_DATASET:-market_analytics}
    GOOGLE_APPLICATION_CREDENTIALS: /opt/airflow/credentials/service_account.json
    LOCAL_DATA_DIR: /tmp/market_data
    API_SLEEP_SECONDS: ${API_SLEEP_SECONDS:-15}

    # dbt environment
    DBT_PROFILES_DIR: /opt/airflow/dbt

  volumes:
    - ./dags:/opt/airflow/dags
    - ./src:/opt/airflow/src
    - ../dbt:/opt/airflow/dbt
    - ../tests:/opt/airflow/tests
    - ./credentials:/opt/airflow/credentials:ro
    - ./requirements.txt:/opt/airflow/requirements.txt:ro
    - airflow-logs:/opt/airflow/logs
    - airflow-plugins:/opt/airflow/plugins

  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    postgres:
      condition: service_healthy

services:
  # ----------------------------------------------------------------------------
  # PostgreSQL — Airflow metadata store
  # ----------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ----------------------------------------------------------------------------
  # Airflow init — run once to create DB and admin user
  # ----------------------------------------------------------------------------
  airflow-init:
    <<: *airflow-common
    user: "0:0"
    environment:
      <<: *airflow-env
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: "admin"
      _AIRFLOW_WWW_USER_PASSWORD: "admin"
      _AIRFLOW_WWW_USER_FIRSTNAME: "Admin"
      _AIRFLOW_WWW_USER_LASTNAME: "User"
      _AIRFLOW_WWW_USER_EMAIL: "admin@example.com"
      _AIRFLOW_WWW_USER_ROLE: "Admin"
      _PIP_ADDITIONAL_REQUIREMENTS: ""
    command: version
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ../dbt:/opt/airflow/dbt
      - ../tests:/opt/airflow/tests
      - ./credentials:/opt/airflow/credentials:ro
      - ./requirements.txt:/opt/airflow/requirements.txt:ro
      - airflow-logs:/opt/airflow/logs

  # ----------------------------------------------------------------------------
  # Airflow webserver — UI on http://localhost:8080
  # ----------------------------------------------------------------------------
  webserver:
    <<: *airflow-common
    command: >
      bash -c "
        pip install --no-cache-dir -r /opt/airflow/requirements.txt --quiet &&
        airflow webserver
      "
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ----------------------------------------------------------------------------
  # Airflow scheduler — triggers and monitors DAG runs
  # ----------------------------------------------------------------------------
  scheduler:
    <<: *airflow-common
    command: >
      bash -c "
        pip install --no-cache-dir -r /opt/airflow/requirements.txt --quiet &&
        airflow scheduler
      "
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type SchedulerJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  postgres-db:
  airflow-logs:
  airflow-plugins:
